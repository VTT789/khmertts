            font-family: KHSAMADY;

            font-display: swap
        }
        :root {
            --bg: #ffffff;
            --sidebar-bg: #f8fafc;
            --accent: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #e2e8f0;
            --panel-width: 380px;
            --vocab-spacing: 8px;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --input-bg: #ffffff;
            --tab-bg: #f1f5f9;
            --slider-track: #cbd5e1;
            --sidebar-width: 400px;
            --emoji-font-size: 32px;
            --pagination-color: #0f172a;
        }
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: Inter, system-ui, sans-serif;
            transition: background-color .2s ease;
            touch-action: pan-y pinch-zoom
        }
        body.night-mode {
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --border: #334155;
            --accent: #3b82f6;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e6;
            --input-bg: #334155;
            --tab-bg: #0f172a;
            --slider-track: #475569;
            --pagination-color: #f1f5f9;
        }
        body.night-mode #floatingMenu,
        body.night-mode .btn-main,
        body.night-mode .control-group,
        body.night-mode .font-select,
        body.night-mode .nav-row button,
        body.night-mode .sidebar,
        body.night-mode .tab-btn,
        body.night-mode .vocab-item,
        body.night-mode .voice-row,
        body.night-mode .voice-select {
            background-color: var(--card-bg);
            border-color: var(--border);
            color: var(--text-primary)
        }
        body.night-mode .vocab-item {
            background: #0f172a;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .4)
        }
        body.night-mode .vocab-item.active {
            background: #1e3a8a;
            border-color: #60a5fa
        }
        body.night-mode .drag-handle {
            background: #0f172a;
            color: #f1f5f9
        }
        body.night-mode .tab-row {
            background: var(--tab-bg)
        }
        body.night-mode .tab-btn.active {
            background: #334155;
            color: #fff
        }
        body.night-mode .tab-btn:not(.active) {
            color: #94a3b8
        }
        body.night-mode .btn-main:not(.btn-accent) {
            background: #334155;
            border-color: #475569;
            color: #f1f5f9
        }
        body.night-mode .btn-accent {
            background: #2563eb
        }
        body.night-mode .bold-icon-btn {
            background: #334155;
            border: 1px solid #475569;
            color: #f1f5f9
        }
        body.night-mode .bold-icon-btn.active {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6
        }
        body.night-mode .content-area {
            background: var(--bg)
        }
        body.night-mode .voice-row {
            background: #0f172a;
            border-color: var(--border)
        }
        body.night-mode .size-row label {
            color: var(--text-secondary)
        }
        body.night-mode .size-slider {
            background: var(--slider-track)
        }
        body.night-mode .select-main-btn {
            background: #334155;
            color: #e2e8f0;
            border: 1px solid #475569
        }
        body.night-mode .select-main-btn:hover {
            background: #475569
        }
        body.night-mode .resizer {
            background: #334155
        }
        body.night-mode .word-wrapper .side-km,
        body.night-mode .word-wrapper .side-zh {
            color: var(--text-primary)
        }
        body.night-mode .drag-dark-toggle {
            color: #f1f5f9
        }
        body.night-mode .file-source-modal {
            background: rgba(0, 0, 0, .8)
        }
        body.night-mode .file-source-card {
            background: #1e293b;
            color: #f1f5f9;
            border: 1px solid #334155
        }
        body.night-mode .source-btn {
            background: #334155;
            color: #f1f5f9
        }
        body.night-mode .source-btn:hover {
            background: #475569
        }
        body.night-mode .close-modal {
            background: #334155;
            color: #f1f5f9
        }
        body.night-mode .close-modal:hover {
            background: #475569
        }
        body.night-mode .url-input-area input {
            background: #334155;
            color: #f1f5f9;
            border-color: #475569
        }
        body.night-mode .confirm-url-btn {
            background: #2563eb
        }
        body.night-mode .offset-reset-btn {
            background: #dc2626 !important
        }
        body.night-mode .offset-reset-btn:hover {
            background: #b91c1c !important
        }
        /* Pagination button color fix for dark/light */
        .pagination-btn {
            color: var(--pagination-color, #0f172a);
        }
        .gear-spin {
            display: inline-block;
            animation: spinRoll 2s linear infinite;
            transform-origin: center center
        }
        @keyframes spinRoll {
            from {
                transform: rotate(0)
            }
            to {
                transform: rotate(360deg)
            }
        }
        .gear-spin:hover {
            animation: spinRoll .8s linear infinite;
            cursor: pointer
        }
        .main-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative
        }
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            min-width: 300px;
            overflow: hidden;
            cursor: pointer;
            transition: background .2s;
            position: relative;
            touch-action: pan-y pinch-zoom
        }
        #floatingMenu {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
            width: var(--panel-width);
            cursor: default;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background .2s, border-color .2s;
            touch-action: none
        }
        #panelContent {
            padding: 12px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch
        }
        .control-group {
            display: none;
            padding: 5px
        }
        .control-group.active {
            display: block
        }
        .drag-handle {
            height: 34px;
            background: #1e293b;
            border-radius: 11px 11px 0 0;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            color: #f8fafc;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .5px;
            gap: 8px;
            white-space: nowrap;
            flex-shrink: 0;
            touch-action: none
        }
        .drag-title-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            overflow: hidden
        }
        .drag-title-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 12px;
            font-weight: 600
        }
        .drag-title-text .badge {
            background: rgba(255, 255, 255, .2);
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 10px
        }
        .aba-icon-inline {
            width: 24px;
            height: 24px;
            cursor: pointer;
            border-radius: 8px;
            transition: transform .1s ease, opacity .2s;
            flex-shrink: 0;
            background: rgba(255, 255, 255, .15);
            padding: 2px;
            box-sizing: border-box;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent
        }
        .aba-icon-inline:active {
            transform: scale(.95)
        }
        .drag-dark-toggle {
            background: 0 0;
            border: none;
            color: inherit;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent
        }
        .drag-dark-toggle:active {
            transform: scale(.95)
        }
        #minimizedTrigger {
            display: none;
            position: fixed;
            z-index: 10000;
            width: 45px;
            height: 45px;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0, 0, 0, .3);
            font-size: 28px;
            touch-action: none;
            user-select: none;
            bottom: 20px;
            right: 20px;
            left: auto;
            top: auto
        }
        #minimizedTrigger .gear-icon {
            display: inline-block;
            animation: spinRoll 2s linear infinite;
            transform-origin: center center
        }
        #minimizedTrigger:hover .gear-icon {
            animation: spinRoll .6s linear infinite
        }
        .tab-row {
            display: flex;
            background: #f1f5f9;
            margin-bottom: 8px;
            border-radius: 6px;
            padding: 2px;
            flex-shrink: 0;
            transition: background .2s
        }
        .tab-btn {
            flex: 1;
            border: none;
            padding: 6px;
            font-size: .7rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            background: 0 0;
            transition: all .2s
        }
        .nav-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px
        }
        .style-grid {
            display: grid;
            grid-template-columns: 25px 1fr 40px 35px 40px;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px
        }
        .side-style-grid {
            display: grid;
            grid-template-columns: 35px 1fr 40px;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px
        }
        .pinyin-style-grid {
            display: grid;
            grid-template-columns: 35px 1fr 40px 40px;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px
        }
        .shadow-style-grid {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            flex-wrap: nowrap
        }
        .shadow-style-grid label {
            font-size: .65rem;
            font-weight: 700;
            width: 110px;
            flex-shrink: 0;
            color: var(--text-secondary)
        }
        .shadow-style-grid .size-slider {
            flex: 1
        }
        .shadow-style-grid span {
            flex-shrink: 0;
            font-size: .7rem;
            min-width: 32px;
            text-align: right
        }
        .voice-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 10px;
            background: #f8fafc;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all .2s
        }
        .size-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            padding: 0 5px
        }
        .size-row label {
            font-size: .65rem;
            font-weight: 700;
            width: 110px;
            color: var(--text-secondary)
        }
        .size-slider {
            flex: 1;
            height: 4px;
            cursor: pointer;
            -webkit-appearance: none;
            background: var(--slider-track);
            border-radius: 2px
        }
        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer
        }
        .custom-font-input,
        .font-select,
        .voice-select {
            padding: 4px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            font-size: .75rem;
            width: 100%;
            transition: all .2s
        }
        .color-input {
            width: 100%;
            height: 24px;
            border: none;
            cursor: pointer;
            background: 0 0;
            padding: 0
        }
        .bold-icon-btn {
            cursor: pointer;
            font-weight: 700;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
            padding: 4px 0;
            transition: all .2s;
            background: #f8fafc;
            color: #334155;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px
        }
        .bold-icon-btn:hover {
            background: #e2e8f0;
            transform: scale(.98)
        }
        .bold-icon-btn.active {
            background: #1e293b;
            color: #fff;
            border-color: #1e293b
        }
        .bold-icon-btn.active::before {
            content: "⬤";
            font-size: .7rem;
            font-weight: 400;
            margin-right: 4px
        }
        .bold-icon-btn.active span {
            font-weight: 700;
            letter-spacing: .5px
        }
        .bold-icon-btn:not(.active)::before {
            content: "○";
            font-size: .7rem;
            font-weight: 400;
            margin-right: 4px;
            opacity: .6
        }
        .bold-icon-btn:not(.active) span {
            font-weight: 400;
            opacity: .7
        }
        .offset-reset-btn {
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: .75rem;
            font-weight: 700;
            transition: all .2s;
            margin-left: 8px
        }
        .offset-reset-btn:hover {
            background: #dc2626;
            transform: scale(.96)
        }
        .display-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            pointer-events: auto;
            background: inherit;
            gap: 2rem;
            overflow: visible;
            touch-action: pan-y pinch-zoom
        }
        .chinese-word {
            position: absolute;
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            gap: 8px 12px;
            cursor: grab;
            padding: 12px 20px;
            transition: none;
            z-index: 10;
            background: 0 0;
            backdrop-filter: none;
            border: none;
            box-shadow: none;
            will-change: left, top;
            white-space: nowrap;
            touch-action: pan-y pinch-zoom;
            max-width: 90vw;
            overflow-x: visible;
            overflow-y: visible
        }
        .chinese-word:active {
            cursor: grabbing
        }
        .char-block {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: nowrap
        }
        .pinyin-top {
            font-size: .35em;
            color: #fff;
            font-weight: 600;
            letter-spacing: .5px;
            line-height: 1.2;
            white-space: nowrap;
            margin-bottom: 4px;
            font-family: 'Segoe UI', system-ui, 'PingFang SC', sans-serif;
            position: relative;
            transition: none;
            order: 1
        }
        body.night-mode .pinyin-top {
            color: #fbbf24
        }
        .chinese-main {
            font-weight: 500;
            color: #fff;
            line-height: 1.2;
            white-space: nowrap;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', system-ui;
            text-shadow: 0 0 0 transparent;
            transition: text-shadow .1s ease;
            order: 2
        }
        .chinese-bottom {
            font-weight: 500;
            letter-spacing: .3px;
            line-height: 1.2;
            white-space: nowrap;
            margin-top: 4px;
            position: relative;
            transition: none;
            color: #fff;
            order: 3
        }
        body.night-mode .chinese-bottom {
            color: #60a5fa
        }
        .khmer-text {
            position: absolute;
            cursor: grab;
            padding: 12px 20px;
            font-size: 32px;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            font-family: KHLazySmooth, 'Segoe UI', system-ui;
            transition: none;
            z-index: 10;
            background: 0 0;
            backdrop-filter: none;
            border: none;
            box-shadow: none;
            text-shadow: 0 0 0 transparent;
            will-change: left, top;
            touch-action: pan-y pinch-zoom;
            max-width: 90vw;
            overflow-x: visible;
            overflow-y: visible
        }
        .khmer-text:active {
            cursor: grabbing
        }
        .emoji-container {
            position: fixed;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, .5);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            font-size: var(--emoji-font-size, 32px);
            pointer-events: auto;
            transition: none;
            border: 1px solid rgba(255, 255, 255, .3);
            white-space: nowrap;
            cursor: grab;
            font-weight: 500;
            letter-spacing: 2px;
            touch-action: none
        }
        .emoji-container:active {
            cursor: grabbing
        }
        .emoji-container.visible {
            display: flex
        }
        .emoji-container.hidden {
            display: none
        }
        .emoji-container:hover {
            background: rgba(0, 0, 0, .7)
        }
        body.night-mode .emoji-container {
            background: rgba(30, 41, 59, .8);
            border-color: rgba(255, 255, 255, .2)
        }
        @media (max-width:700px) {
            .emoji-container {
                padding: 6px 16px
            }
        }
        .sidebar {
            width: var(--sidebar-width);
            min-width: 280px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            transition: width .2s ease, background .2s;
            position: relative
        }
        /* Mobile sidebar - smaller width */
        @media (max-width:700px) {
            .sidebar {
                min-width: 200px;
                width: var(--sidebar-width, 260px);
            }
            .sidebar .side-number-col {
                min-width: 40px;
                margin-right: 6px;
            }
            .sidebar .vocab-item {
                padding: 8px 10px;
            }
            .sidebar .side-zh {
                font-size: 0.9rem;
            }
            .sidebar .side-km {
                font-size: 0.75rem;
            }
        }
        /* Mobile Portrait: 75% Sidebar, 25% Main */
        @media (max-width: 700px) and (orientation: portrait) {
            .main-layout .sidebar:not(.hidden) {
                width: 75vw !important;
                min-width: 75vw !important;
                flex-shrink: 0 !important;
            }
            .main-layout .content-area {
                min-width: 25vw !important;
                flex: 1 1 25vw !important;
